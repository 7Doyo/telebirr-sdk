name: Dart CI

on:
  push:
    branches: [main]
    paths: ['dart_core/**', 'flutter_wrapper/**']
  pull_request:
    branches: [main]
    paths: ['dart_core/**', 'flutter_wrapper/**']

jobs:
  test-dart-core:
    name: Test telebirr_sdk_core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
        working-directory: dart_core
      - name: Analyze
        run: dart analyze --fatal-infos
        working-directory: dart_core
      - name: Test
        run: dart test
        working-directory: dart_core

  test-flutter-wrapper:
    name: Test telebirr_flutter_elements
    runs-on: ubuntu-latest
    needs: test-dart-core
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_wrapper
      - name: Analyze
        run: flutter analyze --fatal-infos
        working-directory: flutter_wrapper
      - name: Test
        run: flutter test
        working-directory: flutter_wrapper

  publish-dart-core:
    name: Publish telebirr_sdk_core
    runs-on: ubuntu-latest
    needs: [test-dart-core, test-flutter-wrapper]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Authenticate pub.dev
        run: echo "${{ secrets.PUB_TOKEN }}" | dart pub token add https://pub.dev
      - name: Check version not already published
        id: check
        run: |
          PKG_VERSION=$(grep -oP 'version:\s*\K.*' pubspec.yaml | tr -d '[:space:]')
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          dart pub publish --dry-run
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/telebirr_sdk_core/versions/$PKG_VERSION")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: dart_core
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: dart pub publish -f
        working-directory: dart_core
      - name: Skip (already published)
        if: steps.check.outputs.exists == 'true'
        run: echo "telebirr_sdk_core@${{ steps.check.outputs.version }} already exists — skipping"

  publish-flutter-wrapper:
    name: Publish telebirr_flutter_elements
    runs-on: ubuntu-latest
    needs: publish-dart-core
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
      - name: Authenticate pub.dev
        run: echo "${{ secrets.PUB_TOKEN }}" | dart pub token add https://pub.dev
      - name: Check version not already published
        id: check
        run: |
          PKG_VERSION=$(grep -oP 'version:\s*\K.*' pubspec.yaml | tr -d '[:space:]')
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          dart pub publish --dry-run
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pub.dev/api/packages/telebirr_flutter_elements/versions/$PKG_VERSION")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: flutter_wrapper
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: dart pub publish -f
        working-directory: flutter_wrapper
      - name: Skip (already published)
        if: steps.check.outputs.exists == 'true'
        run: echo "telebirr_flutter_elements@${{ steps.check.outputs.version }} already exists — skipping"
