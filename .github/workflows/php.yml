name: PHP CI

on:
  push:
    branches: [main]
    paths: ['php-core/**', 'laravel-bridge/**']
  pull_request:
    branches: [main]
    paths: ['php-core/**', 'laravel-bridge/**']

jobs:
  test-php-core:
    name: Test telebirr/sdk-core (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, openssl, mbstring
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: php-core
      - name: Test
        run: vendor/bin/phpunit
        working-directory: php-core

  test-laravel-bridge:
    name: Test telebirr/laravel-bridge
    runs-on: ubuntu-latest
    needs: test-php-core
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, openssl, mbstring
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: laravel-bridge
      - name: Test
        run: vendor/bin/phpunit
        working-directory: laravel-bridge

  publish-packagist:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    needs: [test-php-core, test-laravel-bridge]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, openssl
      - name: Validate php-core
        run: composer validate
        working-directory: php-core
      - name: Validate laravel-bridge
        run: composer validate
        working-directory: laravel-bridge
      - name: Trigger Packagist update
        run: |
          curl -s -X POST \
            "https://packagist.org/api/update-package?repoUrl=https://github.com/${{ github.repository }}" \
            -H "Content-Type: application/json" \
            -H "X-Token: ${{ secrets.PACKAGIST_TOKEN }}"
