name: TypeScript CI

on:
  push:
    branches: [main]
    paths: ['ts-core/**', 'ts-react/**']
  pull_request:
    branches: [main]
    paths: ['ts-core/**', 'ts-react/**']

jobs:
  test-ts-core:
    name: Test @telebirr/sdk-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ts-core/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ts-core
      - name: Build
        run: npm run build
        working-directory: ts-core
      - name: Lint
        run: npm run lint
        working-directory: ts-core
      - name: Test
        run: npm test
        working-directory: ts-core

  test-ts-react:
    name: Test @telebirr/react-elements
    runs-on: ubuntu-latest
    needs: test-ts-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ts-core/package-lock.json
      - name: Build ts-core first (peer dependency)
        run: npm ci && npm run build
        working-directory: ts-core
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ts-react/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ts-react
      - name: Build
        run: npm run build
        working-directory: ts-react
      - name: Lint
        run: npm run lint
        working-directory: ts-react
      - name: Test
        run: npm test
        working-directory: ts-react

  publish-ts-core:
    name: Publish @telebirr/sdk-core
    runs-on: ubuntu-latest
    needs: [test-ts-core, test-ts-react]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Install and build
        run: npm ci && npm run build
        working-directory: ts-core
      - name: Check version not already published
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          RESULT=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)
          if [ "$RESULT" = "$PKG_VERSION" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ts-core
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        working-directory: ts-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Skip (already published)
        if: steps.check.outputs.exists == 'true'
        run: echo "${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }} already exists — skipping"

  publish-ts-react:
    name: Publish @telebirr/react-elements
    runs-on: ubuntu-latest
    needs: publish-ts-core
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Build ts-core first (peer dependency)
        run: npm ci && npm run build
        working-directory: ts-core
      - name: Install and build
        run: npm ci && npm run build
        working-directory: ts-react
      - name: Check version not already published
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          RESULT=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)
          if [ "$RESULT" = "$PKG_VERSION" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: ts-react
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        working-directory: ts-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Skip (already published)
        if: steps.check.outputs.exists == 'true'
        run: echo "${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }} already exists — skipping"
